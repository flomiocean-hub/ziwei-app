<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>命盤排盤系統</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: #0f0c29;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #e8e0f0;
      padding: 24px 16px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 36px; }
    header h1 { font-size: 2rem; letter-spacing: 4px; color: #d4af37; text-shadow: 0 0 20px rgba(212,175,55,0.4); }
    header p { color: #a89cc8; margin-top: 8px; font-size: 0.9rem; letter-spacing: 2px; }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 16px; padding: 32px;
      backdrop-filter: blur(10px); margin-bottom: 24px;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 0.85rem; color: #d4af37; letter-spacing: 1px; }

    input, select {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(212,175,55,0.3);
      border-radius: 8px; padding: 12px 16px; color: #e8e0f0;
      font-size: 1rem; outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #d4af37; }
    select option { background: #302b63; }

    .btn-row { display: flex; gap: 12px; margin-top: 24px; }
    .btn {
      flex: 1; padding: 14px;
      background: linear-gradient(135deg, #d4af37, #f0c040);
      color: #1a1535; border: none; border-radius: 10px;
      font-size: 1.05rem; font-weight: bold; letter-spacing: 2px;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-pdf {
      flex: 0 0 auto; padding: 14px 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(212,175,55,0.4);
      color: #d4af37; border-radius: 10px;
      font-size: 0.9rem; font-weight: bold; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .btn-pdf:hover { background: rgba(212,175,55,0.15); }
    .btn-pdf { display: none; }
    .btn-pdf.visible { display: block; }

    .result { display: none; }

    .result-header {
      text-align: center; padding: 24px;
      background: rgba(212,175,55,0.08); border-radius: 12px;
      margin-bottom: 24px; border: 1px solid rgba(212,175,55,0.3);
    }
    .result-header .person-name { font-size: 1.6rem; color: #d4af37; letter-spacing: 4px; }
    .result-header .meta { font-size: 0.85rem; color: #a89cc8; margin-top: 8px; line-height: 1.8; }

    .highlight-box {
      background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
      border: 1px solid rgba(212,175,55,0.4); border-radius: 12px;
      padding: 20px 24px; margin-bottom: 24px; text-align: center;
    }
    .highlight-box .label { font-size: 0.8rem; color: #a89cc8; letter-spacing: 2px; margin-bottom: 6px; }
    .highlight-box .value { font-size: 1.5rem; color: #f0c040; font-weight: bold; letter-spacing: 4px; }
    .highlight-box .sub { font-size: 0.85rem; color: #c8b8e8; margin-top: 6px; }

    .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr 1fr; } }
    .info-item {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 14px; text-align: center;
    }
    .info-item .info-label { font-size: 0.75rem; color: #a89cc8; margin-bottom: 4px; }
    .info-item .info-value { font-size: 1rem; color: #e8e0f0; font-weight: 500; }

    .section-title {
      font-size: 0.9rem; color: #d4af37; letter-spacing: 3px;
      margin-bottom: 16px; padding-bottom: 8px;
      border-bottom: 1px solid rgba(212,175,55,0.2);
    }

    /* 個性解析 */
    .personality-card {
      background: rgba(138,111,200,0.1); border: 1px solid rgba(138,111,200,0.35);
      border-radius: 14px; padding: 24px; margin-bottom: 24px;
    }
    .personality-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .personality-title { font-size: 1.2rem; color: #c8a8ff; font-weight: bold; letter-spacing: 2px; }
    .tag {
      font-size: 0.72rem; padding: 3px 10px; border-radius: 20px;
      background: rgba(138,111,200,0.25); border: 1px solid rgba(138,111,200,0.5); color: #c8a8ff;
    }
    .personality-summary { font-size: 0.9rem; color: #d8d0f0; line-height: 1.9; margin-bottom: 16px; white-space: pre-line; }
    .personality-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 560px) { .personality-grid { grid-template-columns: 1fr; } }
    .personality-item { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 12px 14px; }
    .personality-item .pi-label { font-size: 0.72rem; color: #a89cc8; margin-bottom: 4px; letter-spacing: 1px; }
    .personality-item .pi-value { font-size: 0.85rem; color: #e0d8f8; line-height: 1.6; }

    /* 大限 */
    .decadal-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
    .decadal-item {
      display: grid; grid-template-columns: 95px 85px 1fr auto;
      align-items: center; gap: 12px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 12px 16px; transition: border-color 0.2s;
    }
    @media (max-width: 600px) { .decadal-item { grid-template-columns: 80px 70px 1fr; } .decadal-stars { display: none; } }
    .decadal-item.current { border-color: #d4af37; background: rgba(212,175,55,0.1); }
    .decadal-range { font-size: 0.85rem; color: #a89cc8; }
    .decadal-range strong { color: #e8e0f0; font-size: 0.95rem; }
    .decadal-ganzhi { font-size: 1rem; color: #e8e0f0; font-weight: 500; }
    .decadal-palace { font-size: 0.85rem; color: #c8b8e8; }
    .decadal-stars { font-size: 0.8rem; color: #8898c8; text-align: right; }
    .current-badge {
      display: inline-block; font-size: 0.65rem; padding: 2px 7px;
      background: #d4af37; color: #1a1535; border-radius: 4px;
      font-weight: bold; margin-left: 6px; vertical-align: middle;
    }

    /* 流年分析 */
    .yearly-overview {
      background: rgba(80,160,220,0.08); border: 1px solid rgba(80,160,220,0.3);
      border-radius: 14px; padding: 20px 24px; margin-bottom: 20px;
    }
    .yearly-overview-top { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; }
    .yearly-ganzhi { font-size: 1.4rem; color: #80c8f8; font-weight: bold; letter-spacing: 3px; }
    .yearly-palace { font-size: 0.9rem; color: #a8d8f8; }
    .yearly-mutagen { display: flex; gap: 8px; flex-wrap: wrap; }
    .mutagen-pill {
      font-size: 0.75rem; padding: 3px 10px; border-radius: 12px; font-weight: 500;
    }
    .mp-lu { background: rgba(80,200,80,0.2); border: 1px solid rgba(80,200,80,0.5); color: #80e880; }
    .mp-quan { background: rgba(80,120,220,0.2); border: 1px solid rgba(80,120,220,0.5); color: #80a8f8; }
    .mp-ke { background: rgba(220,200,80,0.2); border: 1px solid rgba(220,200,80,0.5); color: #f0e060; }
    .mp-ji { background: rgba(220,80,80,0.2); border: 1px solid rgba(220,80,80,0.5); color: #f08080; }
    .yearly-advice { font-size: 0.88rem; color: #c8e4f8; line-height: 1.8; }

    /* 月份表格 */
    .monthly-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 8px;
    }
    @media (max-width: 600px) { .monthly-grid { grid-template-columns: repeat(2, 1fr); } }
    .monthly-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 12px 14px;
    }
    .monthly-card.good { border-color: rgba(80,200,80,0.4); background: rgba(80,200,80,0.06); }
    .monthly-card.alert { border-color: rgba(220,160,60,0.4); background: rgba(220,160,60,0.06); }
    .monthly-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .monthly-num { font-size: 0.75rem; color: #a89cc8; }
    .monthly-ganzhi { font-size: 0.95rem; color: #e8e0f0; font-weight: 500; }
    .monthly-palace { font-size: 0.8rem; color: #80c8f8; margin-bottom: 6px; font-weight: 500; }
    .monthly-theme { font-size: 0.72rem; color: #a89cc8; margin-bottom: 6px; }
    .monthly-mutagen-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
    .m-pill { font-size: 0.65rem; padding: 1px 6px; border-radius: 8px; }
    .monthly-advice { font-size: 0.72rem; color: #b8c8d8; line-height: 1.6; }

    /* 宮位總覽 */
    .palaces-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    @media (max-width: 600px) { .palaces-grid { grid-template-columns: repeat(2, 1fr); } }
    .palace-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 12px; transition: border-color 0.2s; cursor: default;
    }
    .palace-card:hover { border-color: rgba(212,175,55,0.4); }
    .palace-card.is-ming { border-color: #d4af37; background: rgba(212,175,55,0.1); }
    .palace-card.is-body { border-color: #8a6fc8; background: rgba(138,111,200,0.1); }
    .palace-card .palace-name { font-size: 0.75rem; color: #a89cc8; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
    .palace-card .palace-ganzhi { font-size: 1rem; color: #e8e0f0; font-weight: 500; margin-bottom: 6px; }
    .palace-card .stars { font-size: 0.78rem; color: #c8d8f0; line-height: 1.6; min-height: 20px; }
    .palace-card .minor-stars { font-size: 0.7rem; color: #8898b0; margin-top: 4px; }

    .badge { font-size: 0.62rem; padding: 1px 5px; border-radius: 4px; font-weight: bold; }
    .badge-ming { background: #d4af37; color: #1a1535; }
    .badge-body { background: #8a6fc8; color: white; }
    .mutagen { font-size: 0.7rem; padding: 1px 4px; border-radius: 3px; margin-left: 2px; vertical-align: middle; }
    .mutagen-祿 { background: rgba(80,200,80,0.3); color: #80e880; }
    .mutagen-權 { background: rgba(80,120,200,0.3); color: #80a0f0; }
    .mutagen-科 { background: rgba(200,200,80,0.3); color: #f0e880; }
    .mutagen-忌 { background: rgba(200,80,80,0.3); color: #f08080; }

    .error-msg { color: #f08080; text-align: center; padding: 16px; }
    .loading { text-align: center; color: #d4af37; padding: 16px; letter-spacing: 2px; }
    .divider { border: none; border-top: 1px solid rgba(212,175,55,0.15); margin: 24px 0; }

    /* Tab 導航 */
    .tab-nav {
      display: flex; gap: 0; margin-bottom: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,55,0.2); border-radius: 12px; overflow: hidden;
    }
    .tab-btn {
      flex: 1; padding: 14px; background: transparent; border: none;
      color: #a89cc8; font-size: 1rem; font-weight: bold; letter-spacing: 3px;
      cursor: pointer; transition: all 0.2s;
    }
    .tab-btn:hover { color: #d4af37; background: rgba(212,175,55,0.06); }
    .tab-btn.active { background: rgba(212,175,55,0.12); color: #d4af37; border-bottom: 2px solid #d4af37; }

    /* 八字四柱 */
    .bazi-pillars {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px;
    }
    .bazi-pillar {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 14px 10px; text-align: center;
    }
    .bazi-pillar.day-master { border-color: #d4af37; background: rgba(212,175,55,0.1); }
    .bazi-pillar .bp-pos { font-size: 0.7rem; color: #a89cc8; margin-bottom: 8px; letter-spacing: 2px; }
    .bazi-pillar .bp-tengod {
      font-size: 0.72rem; padding: 2px 8px; border-radius: 10px; margin-bottom: 8px;
      display: inline-block; background: rgba(138,111,200,0.2); border: 1px solid rgba(138,111,200,0.4);
      color: #c8a8ff;
    }
    .bazi-pillar .bp-tengod.dm { background: rgba(212,175,55,0.2); border-color: rgba(212,175,55,0.5); color: #d4af37; }
    .bazi-pillar .bp-stem {
      font-size: 2rem; font-weight: bold; margin-bottom: 4px; line-height: 1;
    }
    .bazi-pillar .bp-branch { font-size: 1.8rem; font-weight: bold; margin-bottom: 8px; line-height: 1; }
    .bazi-pillar .bp-elem { font-size: 0.7rem; color: #a89cc8; }

    /* 五行分布 */
    .five-elem-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .fe-row { display: grid; grid-template-columns: 28px 1fr 24px; align-items: center; gap: 10px; }
    .fe-label { font-size: 0.85rem; font-weight: bold; text-align: center; }
    .fe-bar-bg { background: rgba(255,255,255,0.06); border-radius: 6px; height: 18px; overflow: hidden; }
    .fe-bar { height: 100%; border-radius: 6px; transition: width 0.5s; }
    .fe-count { font-size: 0.8rem; color: #a89cc8; text-align: right; }

    /* 大運排盤（八字） */
    .bazi-decadal-header { display: flex; gap: 16px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .bazi-dir-badge {
      font-size: 0.78rem; padding: 3px 10px; border-radius: 8px;
      background: rgba(80,160,220,0.15); border: 1px solid rgba(80,160,220,0.4); color: #80c8f8;
    }
    .bazi-start-age { font-size: 0.82rem; color: #a89cc8; }
    .bazi-limits { display: flex; flex-direction: column; gap: 8px; }
    .bazi-limit-item {
      display: grid; grid-template-columns: 80px 70px 70px 1fr auto;
      align-items: center; gap: 10px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 10px 14px;
    }
    .bazi-limit-item.current { border-color: #d4af37; background: rgba(212,175,55,0.08); }
    .bazi-limit-range { font-size: 0.82rem; color: #a89cc8; }
    .bazi-limit-gz { font-size: 1.1rem; color: #e8e0f0; font-weight: bold; letter-spacing: 2px; }
    .bazi-limit-elem { font-size: 0.78rem; color: #c8b8e8; }

    /* 八字流年 */
    .bazi-flow-box {
      background: rgba(80,160,220,0.08); border: 1px solid rgba(80,160,220,0.3);
      border-radius: 14px; padding: 20px 24px;
    }
    .bazi-flow-top { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    .bazi-flow-gz { font-size: 1.3rem; color: #80c8f8; font-weight: bold; letter-spacing: 3px; }
    .bazi-flow-tg {
      font-size: 0.8rem; padding: 3px 10px; border-radius: 10px;
      background: rgba(138,111,200,0.2); border: 1px solid rgba(138,111,200,0.4); color: #c8a8ff;
    }
    .bazi-flow-theme { font-size: 0.82rem; color: #f0c040; padding: 2px 8px; background: rgba(240,192,64,0.1); border-radius: 6px; }
    .bazi-flow-advice { font-size: 0.88rem; color: #c8e4f8; line-height: 1.8; }

    /* PDF 列印樣式 */
    @media print {
      body { background: #fff !important; color: #111 !important; padding: 0; }
      .card { background: #fff !important; border: 1px solid #ccc !important; box-shadow: none !important; }
      .btn-row, header p { display: none !important; }
      header h1 { color: #333 !important; text-shadow: none !important; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>命盤排盤系統</h1>
    <p>紫微斗數 × 八字命理，輸入出生資料即刻排盤</p>
  </header>

  <div class="tab-nav">
    <button class="tab-btn active" id="tabZiwei" onclick="switchTab('ziwei')">紫微斗數</button>
    <button class="tab-btn" id="tabBazi" onclick="switchTab('bazi')">八字命理</button>
  </div>

  <div class="card">
    <div class="form-grid">
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="name" placeholder="請輸入姓名" />
      </div>
      <div class="form-group">
        <label>性別</label>
        <select id="gender">
          <option value="male">男</option>
          <option value="female">女</option>
        </select>
      </div>
      <div class="form-group">
        <label>出生日期（西曆）</label>
        <input type="date" id="solarDate" />
      </div>
      <div class="form-group">
        <label>出生時辰</label>
        <select id="timeKey">
          <option value="子時">子時（23:00–01:00）</option>
          <option value="丑時">丑時（01:00–03:00）</option>
          <option value="寅時">寅時（03:00–05:00）</option>
          <option value="卯時">卯時（05:00–07:00）</option>
          <option value="辰時">辰時（07:00–09:00）</option>
          <option value="巳時">巳時（09:00–11:00）</option>
          <option value="午時">午時（11:00–13:00）</option>
          <option value="未時">未時（13:00–15:00）</option>
          <option value="申時">申時（15:00–17:00）</option>
          <option value="酉時">酉時（17:00–19:00）</option>
          <option value="戌時">戌時（19:00–21:00）</option>
          <option value="亥時">亥時（21:00–23:00）</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btnCalc" onclick="calculate()">排　紫微　命盤</button>
      <button class="btn-pdf" id="btnPdf" onclick="exportPDF()">下載 PDF</button>
    </div>
  </div>

  <div id="result" class="result">
    <div class="card" id="reportContent">
      <div id="result-content"></div>
    </div>
  </div>

  <div id="resultBazi" class="result">
    <div class="card" id="reportContentBazi">
      <div id="result-content-bazi"></div>
    </div>
  </div>
</div>

<script>
let activeTab = 'ziwei';

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabZiwei').classList.toggle('active', tab === 'ziwei');
  document.getElementById('tabBazi').classList.toggle('active', tab === 'bazi');
  document.getElementById('btnCalc').textContent = tab === 'ziwei' ? '排　紫微　命盤' : '排　八字　命盤';
  document.getElementById('result').style.display = 'none';
  document.getElementById('resultBazi').style.display = 'none';
  document.getElementById('btnPdf').classList.remove('visible');
}

function calculate() {
  if (activeTab === 'ziwei') calculateZiwei();
  else calculateBazi();
}

async function calculateZiwei() {
  const name = document.getElementById('name').value.trim();
  const gender = document.getElementById('gender').value;
  const solarDate = document.getElementById('solarDate').value;
  const timeKey = document.getElementById('timeKey').value;
  if (!name || !solarDate) { alert('請填寫姓名與出生日期'); return; }

  const resultDiv = document.getElementById('result');
  const contentDiv = document.getElementById('result-content');
  resultDiv.style.display = 'block';
  contentDiv.innerHTML = '<div class="loading">排盤中⋯⋯</div>';
  resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });

  try {
    const res = await fetch('/api/chart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, gender, solarDate, timeKey }),
    });
    const data = await res.json();
    if (data.error) { contentDiv.innerHTML = `<div class="error-msg">${data.error}</div>`; return; }
    renderResult(data, contentDiv);
    document.getElementById('btnPdf').classList.add('visible');
    window._chartData = data;
    window._activeReport = 'ziwei';
  } catch (e) {
    contentDiv.innerHTML = '<div class="error-msg">連線失敗，請稍後再試</div>';
  }
}

async function calculateBazi() {
  const name = document.getElementById('name').value.trim();
  const gender = document.getElementById('gender').value;
  const solarDate = document.getElementById('solarDate').value;
  const timeKey = document.getElementById('timeKey').value;
  if (!name || !solarDate) { alert('請填寫姓名與出生日期'); return; }

  const resultDiv = document.getElementById('resultBazi');
  const contentDiv = document.getElementById('result-content-bazi');
  resultDiv.style.display = 'block';
  contentDiv.innerHTML = '<div class="loading">排盤中⋯⋯</div>';
  resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });

  try {
    const res = await fetch('/api/bazi', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, gender, solarDate, timeKey }),
    });
    const data = await res.json();
    if (data.error) { contentDiv.innerHTML = `<div class="error-msg">${data.error}</div>`; return; }
    renderBaziResult(data, contentDiv);
    document.getElementById('btnPdf').classList.add('visible');
    window._baziData = data;
    window._activeReport = 'bazi';
  } catch (e) {
    contentDiv.innerHTML = '<div class="error-msg">連線失敗，請稍後再試</div>';
  }
}

function exportPDF() {
  const isZiwei = window._activeReport !== 'bazi';
  const data = isZiwei ? window._chartData : window._baziData;
  if (!data) return;
  const element = document.getElementById(isZiwei ? 'reportContent' : 'reportContentBazi');
  const prefix = isZiwei ? '紫微命盤' : '八字命盤';
  const opt = {
    margin: [10, 10],
    filename: `${prefix}_${data.name}_${data.solarDate}.pdf`,
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, useCORS: true, backgroundColor: '#1a1535' },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] },
  };
  const btn = document.getElementById('btnPdf');
  btn.textContent = '產生中…';
  btn.disabled = true;
  html2pdf().set(opt).from(element).save().then(() => {
    btn.textContent = '下載 PDF';
    btn.disabled = false;
  });
}

function mTag(m) {
  if (!m) return '';
  return `<span class="mutagen mutagen-${m}">${m}</span>`;
}
function starsHtml(stars) {
  return stars.map(s => `${s.name}${mTag(s.mutagen)}`).join('　');
}
function mPill(label, cls, star) {
  return `<span class="m-pill ${cls}">${label}：${star}</span>`;
}

function renderPersonality(p) {
  if (!p) return '';
  const tags = (p.tags || []).map(t => `<span class="tag">${t}</span>`).join(' ');
  return `
    <div class="personality-card">
      <div class="personality-header">
        <span class="personality-title">${p.title}</span>${tags}
      </div>
      <div class="personality-summary">${p.summary}</div>
      <div class="personality-grid">
        <div class="personality-item"><div class="pi-label">✦ 優勢特質</div><div class="pi-value">${p.strength}</div></div>
        <div class="personality-item"><div class="pi-label">△ 需注意</div><div class="pi-value">${p.weakness}</div></div>
        <div class="personality-item"><div class="pi-label">◎ 適合事業</div><div class="pi-value">${p.career}</div></div>
        <div class="personality-item"><div class="pi-label">♡ 感情特質</div><div class="pi-value">${p.relationship}</div></div>
      </div>
    </div>`;
}

function renderDecadal(list) {
  return `<div class="decadal-list">${list.map(d => {
    const starStr = d.majorStars.map(s => s.name + mTag(s.mutagen)).join('　') || '—';
    const cur = d.isCurrent ? '<span class="current-badge">當前</span>' : '';
    return `<div class="decadal-item ${d.isCurrent ? 'current' : ''}">
      <div class="decadal-range">${cur}<br><strong>${d.range[0]}–${d.range[1]} 歲</strong></div>
      <div class="decadal-ganzhi">${d.heavenlyStem}${d.decadalBranch}宮</div>
      <div class="decadal-palace">${d.palaceName}</div>
      <div class="decadal-stars">${starStr}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderYearly(ya) {
  const [lu, quan, ke, ji] = ya.mutagen;
  const overview = `
    <div class="yearly-overview">
      <div class="yearly-overview-top">
        <span class="yearly-ganzhi">${ya.ganzhi}</span>
        <span class="yearly-palace">流年命宮：${ya.mingPalace}</span>
        <div class="yearly-mutagen">
          <span class="mutagen-pill mp-lu">化祿 ${lu}</span>
          <span class="mutagen-pill mp-quan">化權 ${quan}</span>
          <span class="mutagen-pill mp-ke">化科 ${ke}</span>
          <span class="mutagen-pill mp-ji">化忌 ${ji}</span>
        </div>
      </div>
      <div class="yearly-advice">
        流年命宮落在<strong>${ya.mingPalace}</strong>，
        全年重心集中於「${ya.theme}」相關事務。${ya.advice}
        <br>四化提示：<strong>${lu}</strong>化祿帶來機緣、<strong>${quan}</strong>化權強化行動力、<strong>${ke}</strong>化科利於名聲學習、<strong>${ji}</strong>化忌為今年最需留意之星。
      </div>
    </div>`;

  const months = ya.monthlyAnalysis.map(m => {
    const [mlu, mquan, mke, mji] = m.mutagen;
    return `
      <div class="monthly-card ${m.score}">
        <div class="monthly-top">
          <span class="monthly-num">${m.month} 月</span>
          <span class="monthly-ganzhi">${m.heavenlyStem}${m.earthlyBranch}</span>
        </div>
        <div class="monthly-palace">${m.flowPalace}</div>
        <div class="monthly-theme">${m.theme}</div>
        <div class="monthly-mutagen-row">
          ${mPill('祿', 'm-pill mp-lu', mlu)}
          ${mPill('忌', 'm-pill mp-ji', mji)}
        </div>
        <div class="monthly-advice">${m.advice}</div>
      </div>`;
  }).join('');

  return overview + `<div class="monthly-grid">${months}</div>`;
}

const ELEM_COLOR = {'木':'#6db86d','火':'#e07060','土':'#c8a84e','金':'#b8c8e8','水':'#6090d0'};

function renderBaziResult(data, container) {
  // Four Pillars
  const pillarsHtml = data.pillars.map(p => {
    const color = ELEM_COLOR[p.stemElement] || '#e8e0f0';
    const bColor = ELEM_COLOR[p.branchElement] || '#e8e0f0';
    return `
      <div class="bazi-pillar ${p.isDayMaster ? 'day-master' : ''}">
        <div class="bp-pos">${p.pos}</div>
        <div class="bp-tengod ${p.isDayMaster ? 'dm' : ''}">${p.tenGod}</div>
        <div class="bp-stem" style="color:${color}">${p.stem}</div>
        <div class="bp-branch" style="color:${bColor}">${p.branch}</div>
        <div class="bp-elem">${p.stemYinYang}${p.stemElement} / ${p.branchElement}</div>
      </div>`;
  }).join('');

  // Five Elements bar chart
  const fe = data.fiveElements;
  const maxFe = Math.max(...Object.values(fe), 1);
  const feHtml = ['木','火','土','金','水'].map(e => {
    const cnt = fe[e] || 0;
    const pct = Math.round((cnt / maxFe) * 100);
    const color = ELEM_COLOR[e];
    return `
      <div class="fe-row">
        <div class="fe-label" style="color:${color}">${e}</div>
        <div class="fe-bar-bg">
          <div class="fe-bar" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="fe-count">${cnt}</div>
      </div>`;
  }).join('');

  // Personality
  const p = data.personality;
  const tags = (p.tags||[]).map(t => `<span class="tag">${t}</span>`).join(' ');
  const personalityHtml = `
    <div class="personality-card">
      <div class="personality-header">
        <span class="personality-title" style="color:${ELEM_COLOR[p.element]||'#c8a8ff'}">${p.symbol}（${p.yinYang}${p.element}）</span>${tags}
      </div>
      <div class="personality-summary">${p.summary}</div>
      <div class="personality-grid">
        <div class="personality-item"><div class="pi-label">✦ 優勢特質</div><div class="pi-value">${p.strength}</div></div>
        <div class="personality-item"><div class="pi-label">△ 需注意</div><div class="pi-value">${p.weakness}</div></div>
        <div class="personality-item"><div class="pi-label">◎ 適合事業</div><div class="pi-value">${p.career}</div></div>
        <div class="personality-item"><div class="pi-label">♡ 感情特質</div><div class="pi-value">${p.relationship}</div></div>
      </div>
    </div>`;

  // Decadal major limits
  const dec = data.decadal;
  const decHtml = `
    <div class="bazi-decadal-header">
      <span class="bazi-dir-badge">${dec.direction}</span>
      <span class="bazi-start-age">起運歲數：約 ${dec.startAge} 歲（近似值）</span>
    </div>
    <div class="bazi-limits">${dec.limits.map(l => {
      const sColor = ELEM_COLOR[l.stemElement]||'#e8e0f0';
      const bColor = ELEM_COLOR[l.branchElement]||'#e8e0f0';
      const cur = l.isCurrent ? '<span class="current-badge">當前</span>' : '';
      return `<div class="bazi-limit-item ${l.isCurrent ? 'current' : ''}">
        <div class="bazi-limit-range">${cur}<br>${l.ageRange[0]}–${l.ageRange[1]} 歲</div>
        <div class="bazi-limit-gz"><span style="color:${sColor}">${l.stem}</span><span style="color:${bColor}">${l.branch}</span></div>
        <div class="bazi-limit-elem">${l.stemElement} / ${l.branchElement}</div>
        <div></div>
      </div>`;
    }).join('')}</div>`;

  // Flow year
  const fy = data.flowYear;
  const fyHtml = `
    <div class="bazi-flow-box">
      <div class="bazi-flow-top">
        <span class="bazi-flow-gz">${fy.ganzhi}</span>
        <span class="bazi-flow-tg">對日主：${fy.tenGod}</span>
        <span class="bazi-flow-theme">${fy.theme}</span>
      </div>
      <div class="bazi-flow-advice">${fy.advice}</div>
    </div>`;

  container.innerHTML = `
    <div class="result-header">
      <div class="person-name">${data.name}</div>
      <div class="meta">${data.gender}命｜${data.solarDate}（${data.timeKey}）</div>
    </div>

    <div class="highlight-box">
      <div class="label">日　主</div>
      <div class="value" style="color:${ELEM_COLOR[data.dayMasterElement]||'#f0c040'}">${data.dayMaster}</div>
      <div class="sub">${data.dayMasterYinYang}${data.dayMasterElement}｜${data.dayMasterSymbol}</div>
    </div>

    <hr class="divider">
    <div class="section-title">四　柱　八　字</div>
    <div class="bazi-pillars">${pillarsHtml}</div>

    <hr class="divider">
    <div class="section-title">五行分布</div>
    <div class="five-elem-grid">${feHtml}</div>

    <hr class="divider">
    <div class="section-title">日主性格分析</div>
    ${personalityHtml}

    <hr class="divider">
    <div class="section-title">大運排盤（每十年一柱）</div>
    ${decHtml}

    <hr class="divider">
    <div class="section-title">2026 丙午年流年分析</div>
    ${fyHtml}`;
}

function renderResult(data, container) {
  const palacesHtml = data.palaces.map(p => {
    const badges = [];
    if (p.isMingGong) badges.push('<span class="badge badge-ming">命</span>');
    if (p.isBodyPalace) badges.push('<span class="badge badge-body">身</span>');
    return `<div class="palace-card ${p.isMingGong ? 'is-ming' : ''} ${p.isBodyPalace ? 'is-body' : ''}">
      <div class="palace-name">${p.name}${badges.join('')}</div>
      <div class="palace-ganzhi">${p.heavenlyStem}${p.earthlyBranch}</div>
      <div class="stars">${p.majorStars.length ? starsHtml(p.majorStars) : '&nbsp;'}</div>
      ${p.minorStars.length ? `<div class="minor-stars">${p.minorStars.join(' ')}</div>` : ''}
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="result-header">
      <div class="person-name">${data.name}</div>
      <div class="meta">${data.gender}命｜${data.solarDate}（${data.timeKey}）<br>${data.lunarDate}｜生肖：${data.zodiac}</div>
    </div>

    <div class="highlight-box">
      <div class="label">命　宮</div>
      <div class="value">${data.mingGong.heavenlyStem}${data.mingGong.earthlyBranch}宮</div>
      <div class="sub">五行局：${data.fiveElementsClass}　｜　生年干支：${data.yearlyBranch}${data.mingGong.majorStars.length ? `　｜　命宮主星：${data.mingGong.majorStars.join('　')}` : ''}</div>
    </div>

    <div class="info-grid">
      <div class="info-item"><div class="info-label">身宮</div><div class="info-value">${data.bodyPalace || '—'}</div></div>
      <div class="info-item"><div class="info-label">五行局</div><div class="info-value">${data.fiveElementsClass}</div></div>
      <div class="info-item"><div class="info-label">生年干支</div><div class="info-value">${data.yearlyBranch}</div></div>
    </div>

    <hr class="divider">
    <div class="section-title">命宮主星個性解析</div>
    ${renderPersonality(data.personality)}

    <hr class="divider">
    <div class="section-title">大限排盤（每十年一宮）</div>
    ${renderDecadal(data.decadalList)}

    <hr class="divider">
    <div class="section-title">2026 年流年運勢分析</div>
    ${renderYearly(data.yearlyAnalysis)}

    <hr class="divider">
    <div class="section-title">十二宮位總覽</div>
    <div class="palaces-grid">${palacesHtml}</div>`;
}
</script>
</body>
</html>
